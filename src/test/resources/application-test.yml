spring:
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    listener:
      auto-startup: false
    admin:
      auto-create: false
    producer:
      retries: 0
      properties:
        max.block.ms: 1000
        request.timeout.ms: 1000
        delivery.timeout.ms: 1000

logging:
  level:
    org.apache.kafka: ERROR
    org.springframework.kafka: ERROR
    com.tumipay: DEBUG
